name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  STATE_CONNECTOR_REPO: sebt-self-service-portal-state-connector
  NUGET_STORE: ${{ github.workspace }}/nuget-store

jobs:
  build-interfaces:
    name: Build state connector package
    runs-on: ubuntu-latest
    steps:
      - name: Determine state connector ref
        id: connector-ref
        run: |
          # Same-named branch as this run (PR head branch or push branch)
          BRANCH="${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}"
          # Fallback when that branch does not exist in the state connector repo
          FALLBACK="${{ github.event_name == 'pull_request' && github.base_ref || 'main' }}"
          REPO_URL="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository_owner }}/${{ env.STATE_CONNECTOR_REPO }}.git"
          if git ls-remote --exit-code --heads "$REPO_URL" "refs/heads/${BRANCH}" 1>/dev/null 2>&1; then
            echo "ref=${BRANCH}" >> "$GITHUB_OUTPUT"
            echo "Using state connector branch: ${BRANCH}"
          else
            echo "ref=${FALLBACK}" >> "$GITHUB_OUTPUT"
            echo "Branch '${BRANCH}' not in state connector, using: ${FALLBACK}"
          fi

      - name: Checkout state connector
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/${{ env.STATE_CONNECTOR_REPO }}
          ref: ${{ steps.connector-ref.outputs.ref }}
          path: state-connector
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Build and pack Interfaces
        run: |
          dotnet build state-connector/src/SEBT.Portal.StatesPlugins.Interfaces/SEBT.Portal.StatesPlugins.Interfaces.csproj -c Release
          mkdir -p "$NUGET_STORE"
          cp "$HOME/nuget-store"/*.nupkg "$NUGET_STORE/"

      - name: Upload nuget-store
        uses: actions/upload-artifact@v4
        with:
          name: nuget-store
          path: ${{ env.NUGET_STORE }}

  build-and-test:
    name: Build and test CO connector
    runs-on: ubuntu-latest
    needs: build-interfaces
    steps:
      - name: Checkout CO connector
        uses: actions/checkout@v4

      - name: Download nuget-store
        id: download-nuget-store
        uses: actions/download-artifact@v4
        with:
          name: nuget-store

      - name: Setup nuget-store for restore
        run: |
          mkdir -p "$HOME/nuget-store"
          cp "${{ steps.download-nuget-store.outputs.download-path }}"/*.nupkg "$HOME/nuget-store/"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        env:
          Cbms__SandboxClientId: ${{ secrets.CBMS_SANDBOX_CLIENT_ID }}
          Cbms__SandboxClientSecret: ${{ secrets.CBMS_SANDBOX_CLIENT_SECRET }}
          Cbms__UseMockResponses: "true"
        run: dotnet test --no-build -c Release
